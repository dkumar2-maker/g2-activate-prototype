<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Manage Plan — G2 Activate</title>
  <link rel="stylesheet" href="../shared/elevate-lite/tokens/elevate.css">
  <link rel="stylesheet" href="../shared/elevate-lite/components/elevate.css">
  <link rel="stylesheet" href="../shared/elevate-lite/icons/icons.css">
  <style>
    body { margin: 0; font-family: var(--font-sans); }

    /* MyG2 Global Header */
    .myg2-header {
      background: white;
      height: 60px;
      border-bottom: 0.5px solid var(--border-medium);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
    }
    .myg2-header-left {
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .back-arrow {
      width: 24px;
      height: 24px;
      cursor: pointer;
      color: var(--text-default);
      flex-shrink: 0;
    }
    .myg2-header-right {
      display: flex;
      align-items: center;
      gap: 24px;
    }
    .myg2-logo {
      width: 36px;
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .myg2-logo img {
      width: 36px;
      height: 36px;
      display: block;
    }
    .help-icon, .user-avatar {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }
    .help-icon {
      border: 1px solid var(--border-light);
      color: var(--text-subtle);
    }
    .user-avatar {
      background: var(--bg-primary);
      color: white;
      font-size: 14px;
      font-weight: 600;
    }

    /* Breadcrumbs */
    .breadcrumbs {
      display: flex;
      align-items: center;
      gap: 2px;
      margin-bottom: 6px;
    }
    .breadcrumb-link,
        .breadcrumb-link:link,
        .breadcrumb-link:visited {
          color: var(--text-nonessential);
          text-decoration: none;
          font-size: 12px;
          line-height: 16px;
          transition: color 150ms ease;
        }
    .breadcrumb-link:hover {
      color: var(--text-default);
    }
    .breadcrumb-link.current {
      color: var(--text-default);
    }
    .breadcrumb-separator {
          width: 20px;
          height: 20px;
          flex-shrink: 0;
          color: var(--text-nonessential);
        }

    /* Page Header */
    .page-header {
      padding: 24px 0;
    }
    .page-title-row {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .page-title {
      font-size: 28px;
      font-weight: 800;
      color: var(--text-default);
      line-height: 36px;
      margin: 0;
    }

    /* Content Area */
    .content-area {
      background: var(--bg-neutral-5);
      padding: 0 24px 24px;
      min-height: calc(100vh - 60px);
    }

    /* Two-Column Layout */
    .two-col-layout {
      display: flex;
      gap: 24px;
      align-items: flex-start;
    }
    .col-main {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
      gap: 24px;
    }
    .col-sidebar {
      width: 400px;
      flex-shrink: 0;
      position: sticky;
      top: 24px;
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    .content-card {
      background: white;
      border: 0.5px solid var(--border-light);
      border-radius: 12px;
      box-shadow: 0px 0px 1px 0px rgba(32,31,35,0.32), 0px 4px 4px 0px rgba(32,31,35,0.04);
      display: flex;
      flex-direction: column;
    }

    /* Stat Card */
    .stat-card-body {
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .status-badge {
      background: #f2f2f3;
      border: 0.5px solid #dfdfe2;
      border-radius: 8px;
      padding: 4px 8px;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      align-self: flex-start;
    }

    .status-badge-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
    }

    .status-badge-dot--active {
      background: #1fa896;
    }

    .status-badge-label {
      font-size: 14px;
      font-weight: 600;
      color: var(--text-subtle);
      line-height: 20px;
    }

    .plan-name {
      font-size: 16px;
      font-weight: 600;
      color: var(--text-nonessential);
      margin: 0;
      line-height: 24px;
    }

    .plan-price-row {
      display: flex;
      align-items: baseline;
      gap: 4px;
    }

    .plan-price {
      font-size: 38px;
      font-weight: 700;
      color: var(--text-default);
      line-height: 48px;
      margin: 0;
    }

    .plan-price-period {
      font-size: 21px;
      font-weight: 400;
      color: var(--text-nonessential);
      margin: 0;
    }

    .plan-description {
      font-size: 12px;
      font-weight: 400;
      color: var(--text-subtle);
      margin: 0;
      line-height: 16px;
      padding-top: 4px;
    }

    /* Payment Method Card */
    .pm-header {
      padding: 24px;
      border-bottom: 0.5px solid var(--border-medium);
      min-height: 76px;
      box-sizing: border-box;
      display: flex;
      align-items: center;
    }

    .pm-header-title {
      font-size: 21px;
      font-weight: 700;
      color: var(--text-default);
      margin: 0;
      line-height: 28px;
    }

    .pm-body {
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .pm-sublabel {
      font-size: 16px;
      font-weight: 600;
      color: var(--text-nonessential);
      margin: 0;
      line-height: 24px;
    }

    .card-info-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .visa-badge {
      width: 35px;
      height: 24px;
      background: #1a1f71;
      border-radius: 4px;
      color: white;
      font-size: 10px;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .card-text {
      font-size: 16px;
      line-height: 24px;
    }

    .card-text strong {
      font-weight: 600;
      color: var(--text-default);
    }

    .card-text span {
      font-weight: 400;
      color: var(--text-default);
    }

    .manage-link-wrapper {
      margin-top: 4px;
    }

    .text-link {
      font-size: 14px;
      font-weight: 400;
      color: var(--text-link);
      text-decoration: none;
      cursor: pointer;
    }

    /* Sidebar */
    .sidebar-card-body {
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    .sidebar-section {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .sidebar-label {
      font-size: 15px;
      font-weight: 600;
      color: var(--text-nonessential);
      margin: 0;
      line-height: 21px;
    }

    .sidebar-value {
      font-size: 21px;
      font-weight: 700;
      color: var(--text-default);
      line-height: 29px;
      margin: 0;
    }

    .sidebar-hr {
      height: 1px;
      background: #cacaca;
      width: 100%;
    }

    .credits-section {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .credits-label-group {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .credits-label {
      font-size: 15px;
      font-weight: 600;
      color: var(--text-nonessential);
      margin: 0;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .credits-value {
      font-size: 38px;
      font-weight: 700;
      color: var(--text-default);
      line-height: 53px;
      margin: 0;
    }

    /* Buttons */
    .btn {
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      box-sizing: border-box;
      font-family: inherit;
    }

    .btn--primary {
      background: var(--bg-primary);
      color: white;
    }

    .btn--primary:hover {
      background: #45388f;
    }

    .btn--primary:focus {
      box-shadow: 0px 0px 0px 0.5px white, 0px 0px 0px 3px rgb(195, 189, 229);
      outline: none;
    }

    .btn--md {
      padding: 8px 12px;
      font-size: 14px;
      font-weight: 600;
      line-height: 20px;
      border-radius: 100px;
      min-height: 40px;
    }
  </style>
</head>
<body>

<header class="myg2-header">
  <div class="myg2-header-left">
    <svg class="back-arrow" width="24" height="24" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M6.875 10.75L11.0625 14.9375L10 16L4 10L10 4L11.0625 5.0625L6.875 9.25H16V10.75H6.875Z" fill="currentColor"/>
    </svg>
    <div class="myg2-logo">
      <img src="../shared/elevate-lite/assets/logos/g2-logo-rorange.svg" alt="G2 Logo" />
    </div>
    <span style="font-size: 16px; font-weight: 600; margin-left: 4px;">MyG2</span>
  </div>
  <div class="myg2-header-right">
    <div class="help-icon">?</div>
    <div class="user-avatar">HC</div>
  </div>
</header>

<div elv>
  <div class="content-area">

    <div class="page-header">
      <nav class="breadcrumbs">
        <a href="#" class="breadcrumb-link">Home</a>
        <svg class="breadcrumb-separator" viewBox="0 0 20 20" xmlns="http://www.w3.org/2000/svg">
          <path d="M10.875 10L6.9375 6.0625L8 5L13 10L8 15L6.9375 13.9375L10.875 10Z" fill="currentColor"/>
        </svg>
        <a href="#" class="breadcrumb-link">Buyer Activity</a>
        <svg class="breadcrumb-separator" viewBox="0 0 20 20" xmlns="http://www.w3.org/2000/svg">
          <path d="M10.875 10L6.9375 6.0625L8 5L13 10L8 15L6.9375 13.9375L10.875 10Z" fill="currentColor"/>
        </svg>
        <a href="prospects-available.html" class="breadcrumb-link">G2 Activate</a>
        <svg class="breadcrumb-separator" viewBox="0 0 20 20" xmlns="http://www.w3.org/2000/svg">
          <path d="M10.875 10L6.9375 6.0625L8 5L13 10L8 15L6.9375 13.9375L10.875 10Z" fill="currentColor"/>
        </svg>
        <span class="breadcrumb-link current">Manage Plan</span>
      </nav>

      <div class="page-title-row">
        <h1 class="page-title">Manage Plan</h1>
      </div>
    </div>

    <div class="two-col-layout">

      <div class="col-main">

        <div class="content-card">
          <div class="stat-card-body">
            <div class="status-badge">
              <div class="status-badge-dot status-badge-dot--active"></div>
              <span class="status-badge-label">Active</span>
            </div>
            <h3 class="plan-name">G2 Activate Pro</h3>
            <div class="plan-price-row">
              <span class="plan-price">$499</span>
              <span class="plan-price-period">/month</span>
            </div>
            <p class="plan-description">Get 5,000 credits each month to exchange for verified, in-market leads.</p>
          </div>
        </div>

        <div class="content-card">
          <div class="pm-header">
            <h2 class="pm-header-title">Payment Method</h2>
          </div>
          <div class="pm-body">
            <p class="pm-sublabel">Current Payment Method</p>
            <div class="card-info-row">
              <div class="visa-badge">VISA</div>
              <div class="card-text"><strong>Visa</strong><span> ending in 1234</span></div>
            </div>
            <div class="manage-link-wrapper">
              <a href="#" class="text-link">Manage payment methods</a>
            </div>
          </div>
        </div>

      </div>

      <div class="col-sidebar">

        <div class="content-card">
          <div class="sidebar-card-body">
            <div class="sidebar-section">
              <p class="sidebar-label">Renew at</p>
              <p class="sidebar-value" id="renew-date">—</p>
            </div>
            <div class="sidebar-hr"></div>
            <div class="credits-section">
              <div class="credits-label-group">
                <h3 class="credits-label">Your Credits <svg width="20" height="20" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M10 2C11.111 2 12.1491 2.20841 13.1143 2.625C14.0795 3.04167 14.9271 3.61458 15.6562 4.34375C16.3854 5.07292 16.9583 5.92046 17.375 6.88574C17.7916 7.85094 18 8.88899 18 10C18 11.0972 17.7917 12.1323 17.375 13.1045C16.9583 14.0766 16.3853 14.9272 15.6562 15.6562C14.9271 16.3854 14.0795 16.9583 13.1143 17.375C12.1491 17.7916 11.111 18 10 18C8.90278 18 7.86773 17.7917 6.89551 17.375C5.9234 16.9583 5.07285 16.3853 4.34375 15.6562C3.61465 14.9272 3.04166 14.0766 2.625 13.1045C2.20833 12.1323 2 11.0972 2 10C2 8.88899 2.20841 7.85094 2.625 6.88574C3.04167 5.92046 3.61458 5.07292 4.34375 4.34375C5.07285 3.61465 5.9234 3.04166 6.89551 2.625C7.86773 2.20833 8.90278 2 10 2ZM8.79199 8.5H5L8.08301 10.708L6.91699 14.5L10 12.1455L13.083 14.5L11.917 10.708L15 8.5H11.208L10 4.5L8.79199 8.5Z" fill="#5746B2"/></svg></h3>
                <div class="credits-value" data-credits>0</div>
              </div>
              <button id="add-credits-btn" class="btn btn--secondary btn--md">Add credits</button>
            </div>
          </div>
        </div>

        <button id="cancel-btn" class="btn btn--text-neutral btn--md">Cancel Subscription</button>

      </div>

    </div>

  </div>
</div>

<script src="../prototype-state.js"></script>
<script>
(function() {
  if (typeof G2ActivateState === 'undefined') return;
  G2ActivateState.updateCreditDisplay();

  var plan = G2ActivateState.getPlan();
  if (plan.renewDate) {
    var d = new Date(plan.renewDate + 'T00:00:00');
    var el = document.getElementById('renew-date');
    if (el) el.textContent = d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
  }

  var addCreditsBtn = document.getElementById('add-credits-btn');
  if (addCreditsBtn) {
    addCreditsBtn.addEventListener('click', function() {
      window.location.href = 'manage-plan-purchase-credits-03.html';
    });
  }

  var cancelBtn = document.getElementById('cancel-btn');
  if (cancelBtn) {
    cancelBtn.addEventListener('click', function(e) {
      e.preventDefault();
      if (confirm('Are you sure you want to cancel your subscription?')) {
        G2ActivateState.updatePlanStatus('inactive');
        alert('Your subscription has been cancelled.');
        window.location.href = 'manage-plan-inactive.html';
      }
    });
  }
})();
</script>

</body>
</html>
